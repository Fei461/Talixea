<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Talixea — Aprende idiomas leyendo</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F9F6F0;--text:#1E293B;--soft:#64748B;--mute:#94A3B8;
  --indigo:#6366F1;--il:#818CF8;--ip:#EEF2FF;--id:#4F46E5;
  --white:#fff;--border:#E2E8F0;--bs:#F1F5F9;
  --sh:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.06);
  --sh2:0 8px 32px rgba(0,0,0,.12);
  --r:16px;--rs:10px;
}
html{scroll-behavior:smooth}
body{background:var(--bg);font-family:'Inter',sans-serif;color:var(--text);min-height:100vh}
.app{max-width:480px;margin:0 auto;min-height:100vh}

/* ── UTILS ── */
.btn-p{display:flex;align-items:center;justify-content:center;gap:8px;background:var(--indigo);color:#fff;border:none;cursor:pointer;padding:14px 28px;border-radius:var(--rs);font-family:'Inter',sans-serif;font-size:15px;font-weight:600;transition:all .2s;width:100%}
.btn-p:hover{background:var(--id);transform:translateY(-1px);box-shadow:0 4px 20px rgba(99,102,241,.4)}
.btn-g{background:none;border:1.5px solid var(--border);cursor:pointer;padding:12px 20px;border-radius:var(--rs);font-family:'Inter',sans-serif;font-size:14px;font-weight:500;color:var(--soft);transition:all .2s;width:100%}
.btn-g:hover{border-color:var(--indigo);color:var(--indigo)}
input[type=email],input[type=password],input[type=text]{width:100%;padding:12px 16px;border-radius:var(--rs);border:1.5px solid var(--border);background:#fff;font-family:'Inter',sans-serif;font-size:15px;color:var(--text);outline:none;transition:border-color .2s}
input:focus{border-color:var(--indigo);box-shadow:0 0 0 3px rgba(99,102,241,.12)}
label{font-size:13px;font-weight:600;color:var(--text);display:block;margin-bottom:6px}
.fg{margin-bottom:16px}
.lnk{background:none;border:none;cursor:pointer;color:var(--indigo);font-size:14px;font-weight:600;font-family:'Inter',sans-serif}

/* ── LANDING ── */
.landing{background:var(--bg);min-height:100vh;overflow-x:hidden}

/* NAV LANDING */
.lnav{display:flex;align-items:center;justify-content:space-between;padding:18px 24px;position:sticky;top:0;z-index:100;background:rgba(249,246,240,.92);backdrop-filter:blur(16px);border-bottom:1px solid rgba(226,232,240,.6)}
.lnav-logo{display:flex;align-items:center;gap:2px;cursor:pointer;text-decoration:none}
.lnav-mark{display:none}
.logo-text{font-family:'Lora',serif;font-size:20px;font-weight:700;color:var(--text);letter-spacing:0.5px}
.logo-text .lt{color:var(--indigo);font-size:24px}
.lnav-t{display:none}
.lnav-btns{display:flex;gap:10px;align-items:center}
.lnav-in{background:none;border:none;cursor:pointer;font-size:14px;font-weight:500;color:var(--soft);font-family:'Inter',sans-serif;padding:8px 14px;border-radius:8px;transition:all .18s}
.lnav-in:hover{color:var(--text);background:var(--bs)}
.lnav-reg{background:var(--indigo);color:#fff;border:none;cursor:pointer;font-size:14px;font-weight:600;font-family:'Inter',sans-serif;padding:9px 18px;border-radius:8px;transition:all .2s}
.lnav-reg:hover{background:var(--id)}

/* HERO */
.hero-sec{padding:64px 24px 48px;text-align:center;position:relative;overflow:hidden}
.hero-blob{position:absolute;top:-80px;left:50%;transform:translateX(-50%);width:500px;height:400px;background:radial-gradient(ellipse,rgba(99,102,241,.12) 0%,transparent 70%);pointer-events:none;z-index:0}
.hero-badge{display:inline-flex;align-items:center;gap:6px;background:var(--ip);color:var(--indigo);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:700;letter-spacing:.3px;margin-bottom:24px;border:1px solid rgba(99,102,241,.2);position:relative;z-index:1}
.hero-h{font-family:'Lora',serif;font-size:36px;line-height:1.2;font-weight:700;color:var(--text);margin-bottom:18px;position:relative;z-index:1}
.hero-h em{font-style:italic;color:var(--indigo)}
.hero-sub{font-size:16px;color:var(--soft);line-height:1.7;margin-bottom:36px;position:relative;z-index:1;max-width:360px;margin-left:auto;margin-right:auto}
.hero-btns{display:flex;flex-direction:column;gap:12px;max-width:320px;margin:0 auto 48px;position:relative;z-index:1}
.hero-btns .btn-p{font-size:16px;padding:16px}
.hero-trust{display:flex;align-items:center;justify-content:center;gap:20px;position:relative;z-index:1}
.hero-trust-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--mute);font-weight:500}

/* DEMO INTERACTIVA */
.demo-sec{padding:0 24px 56px;position:relative;z-index:1}
.demo-card{background:#fff;border-radius:20px;box-shadow:var(--sh2);border:1px solid var(--border);overflow:hidden}
.demo-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.demo-libro{font-family:'Lora',serif;font-size:14px;font-weight:700;color:var(--text)}
.demo-lang{display:flex;align-items:center;gap:6px;background:var(--ip);border-radius:8px;padding:5px 10px;font-size:12px;font-weight:700;color:var(--indigo)}
.demo-slider-wrap{padding:14px 20px;background:var(--bs);border-bottom:1px solid var(--border)}
.demo-slider-lbl{display:flex;justify-content:space-between;font-size:11px;color:var(--mute);font-weight:500;margin-bottom:8px}
.demo-slider{width:100%;-webkit-appearance:none;appearance:none;height:5px;border-radius:3px;outline:none;cursor:pointer}
.demo-slider::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--indigo);cursor:pointer;border:3px solid #fff;box-shadow:0 1px 6px rgba(99,102,241,.4)}
.demo-txt{padding:20px;font-family:'Lora',serif;font-size:16px;line-height:1.9;color:var(--text);min-height:120px}
.demo-pal{color:var(--indigo);font-weight:600;background:var(--ip);border-radius:3px;padding:0 3px;cursor:help;position:relative}
.demo-pal:hover::after{content:attr(data-orig);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--text);color:#fff;border-radius:7px;padding:5px 10px;font-size:11px;white-space:nowrap;font-family:'Inter',sans-serif;z-index:10}

/* FEATURES */
.feat-sec{padding:40px 24px 56px}
.feat-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--indigo);margin-bottom:12px}
.feat-h{font-family:'Lora',serif;font-size:26px;font-weight:700;color:var(--text);margin-bottom:32px;line-height:1.3}
.feat-list{display:flex;flex-direction:column;gap:20px}
.feat-item{display:flex;gap:16px;align-items:flex-start}
.feat-ico{width:42px;height:42px;border-radius:12px;background:var(--ip);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:20px}
.feat-body h3{font-size:15px;font-weight:700;color:var(--text);margin-bottom:4px}
.feat-body p{font-size:13px;color:var(--soft);line-height:1.6}

/* SCIENCE */
.sci-sec{padding:40px 24px 56px;background:#fff;margin:0;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.sci-quote{font-family:'Lora',serif;font-size:18px;font-style:italic;color:var(--text);line-height:1.7;margin-bottom:20px;padding-left:16px;border-left:3px solid var(--indigo)}
.sci-author{font-size:13px;color:var(--mute);font-weight:500}

/* FAQ */
.faq-sec{padding:40px 24px 56px}
.faq-item{border-bottom:1px solid var(--border);padding:18px 0;cursor:pointer}
.faq-item:first-child{border-top:1px solid var(--border)}
.faq-q{display:flex;justify-content:space-between;align-items:center;gap:12px}
.faq-qt{font-size:15px;font-weight:600;color:var(--text);line-height:1.4}
.faq-ico{font-size:18px;color:var(--mute);flex-shrink:0;transition:transform .25s}
.faq-ico.open{transform:rotate(45deg);color:var(--indigo)}
.faq-a{font-size:14px;color:var(--soft);line-height:1.7;margin-top:12px;display:none}
.faq-a.open{display:block}

/* CTA FINAL */
.cta-sec{padding:48px 24px;text-align:center;background:linear-gradient(160deg,#1E293B 0%,#0F172A 100%);margin-top:0}
.cta-h{font-family:'Lora',serif;font-size:28px;font-weight:700;color:#fff;margin-bottom:14px;line-height:1.3}
.cta-sub{font-size:15px;color:rgba(255,255,255,.65);margin-bottom:32px;line-height:1.6}
.cta-sec .btn-p{max-width:320px;margin:0 auto;font-size:16px;padding:16px}
.cta-trust{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:20px}
.cta-trust-item{font-size:12px;color:rgba(255,255,255,.4)}

/* FOOTER */
.lfoot{padding:24px;text-align:center;font-size:12px;color:var(--mute)}

/* ── AUTH ── */
.auth{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;background:var(--bg)}
.auth-logo{display:flex;align-items:center;gap:6px;margin-bottom:40px;cursor:pointer}
.auth-lm{display:none}
.auth-lt{display:none}
.auth-logo .logo-text{font-size:26px}
.auth-logo .logo-text .lt{font-size:32px}
.auth-card{width:100%;max-width:380px;background:#fff;border-radius:var(--r);padding:32px;box-shadow:var(--sh);border:1px solid var(--border)}
.auth-title{font-family:'Lora',serif;font-size:22px;font-weight:700;margin-bottom:6px}
.auth-sub{font-size:14px;color:var(--soft);margin-bottom:28px;line-height:1.5}
.auth-foot{text-align:center;margin-top:20px;font-size:14px;color:var(--soft)}
.auth-err{background:#FEF2F2;color:#DC2626;border-radius:6px;padding:10px 14px;font-size:13px;margin-bottom:16px;border:1px solid #FECACA}

/* SELECTOR IDIOMA EN REGISTRO */
.lang-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:24px}
.lang-opt{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:var(--rs);border:2px solid var(--border);cursor:pointer;transition:all .18s;background:var(--bg)}
.lang-opt:hover{border-color:var(--il)}
.lang-opt.on{border-color:var(--indigo);background:var(--ip)}
.lang-flag{width:28px;height:28px;border-radius:50%;overflow:hidden;flex-shrink:0}
.lang-name{font-size:13px;font-weight:600;color:var(--soft)}
.lang-opt.on .lang-name{color:var(--indigo)}

/* ── HEADER APP ── */
.hdr{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:rgba(249,246,240,.94);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
.logo{display:flex;align-items:center;gap:9px;cursor:pointer}
.logo-m{display:none}
.logo-t{display:none}
.logo-text{font-family:'Lora',serif;font-size:19px;font-weight:700;color:var(--text);letter-spacing:0.5px;line-height:1}
.logo-text .lt{color:var(--indigo);font-size:23px}
.nav{display:flex;gap:2px}
.np{border:none;background:transparent;cursor:pointer;padding:7px 12px;border-radius:8px;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;color:var(--soft);transition:all .18s}
.np.on{background:var(--ip);color:var(--indigo);font-weight:600}
.np:hover:not(.on){background:var(--bs);color:var(--text)}
.av{width:34px;height:34px;border-radius:50%;background:var(--indigo);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700;flex-shrink:0}
.pm-wrap{position:absolute;top:60px;right:16px;z-index:200;background:#fff;border-radius:var(--rs);border:1px solid var(--border);box-shadow:var(--sh2);min-width:200px;overflow:hidden}
.pm-hdr{padding:14px 16px;border-bottom:1px solid var(--bs)}
.pm-name{font-size:14px;font-weight:700}.pm-email{font-size:12px;color:var(--mute)}
.pm-item{display:flex;align-items:center;gap:10px;padding:12px 16px;font-size:14px;color:var(--text);cursor:pointer;border:none;background:none;width:100%;text-align:left;font-family:'Inter',sans-serif;font-weight:500;transition:background .15s}
.pm-item:hover{background:var(--bs)}.pm-item.danger{color:#DC2626}

/* ── RACHA ── */
.racha{display:flex;align-items:center;gap:14px;background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:14px 18px;margin:16px 20px 0;box-shadow:var(--sh)}
.racha-ic{font-size:28px;line-height:1}
.racha-inf{flex:1}
.racha-top{display:flex;align-items:baseline;gap:5px;margin-bottom:6px}
.racha-n{font-size:22px;font-weight:700;color:var(--text)}
.racha-lb{font-size:13px;color:var(--soft);font-weight:500}
.rb-bg{height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:4px}
.rb-fill{height:100%;background:linear-gradient(90deg,var(--il),var(--indigo));border-radius:3px;transition:width .5s}
.racha-mt{font-size:11px;color:var(--mute)}

/* ── INICIO ── */
.imain{padding-bottom:48px}
.hero-app{padding:28px 20px 20px}
.hero-app-t{font-family:'Lora',serif;font-size:28px;line-height:1.25;font-weight:700;margin-bottom:10px}
.hero-app-s{font-size:14px;color:var(--soft);line-height:1.7}

/* IDIOMA ACTIVO BADGE */
.idioma-activo{display:flex;align-items:center;gap:12px;background:#fff;border-radius:var(--rs);padding:14px 16px;border:1.5px solid var(--indigo);box-shadow:0 0 0 3px rgba(99,102,241,.08)}
.ia-flag{width:36px;height:36px;border-radius:50%;overflow:hidden;flex-shrink:0}
.ia-info{flex:1}
.ia-label{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--mute);font-weight:600;display:block;margin-bottom:2px}
.ia-name{font-size:16px;font-weight:700;color:var(--text)}
.ia-change{font-size:12px;color:var(--indigo);font-weight:600;background:none;border:none;cursor:pointer;font-family:'Inter',sans-serif}

/* SECCIÓN */
.sec{padding:24px 20px 0}
.sec-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.sec-t{font-size:12px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:.6px}
.ver-t{background:none;border:none;cursor:pointer;font-size:13px;color:var(--indigo);font-weight:600;font-family:'Inter',sans-serif}

/* PROGRESO INMERSIÓN INFO */
.imm-info{background:var(--ip);border-radius:var(--rs);padding:14px 16px;border:1px solid rgba(99,102,241,.15)}
.imm-info-t{font-size:13px;font-weight:600;color:var(--indigo);margin-bottom:4px}
.imm-info-s{font-size:12px;color:var(--soft);line-height:1.5}

/* LIBROS */
.lb-scroll{display:flex;gap:14px;padding:4px 20px 24px;overflow-x:auto;scrollbar-width:none}
.lb-scroll::-webkit-scrollbar{display:none}
.lb-card{flex:0 0 148px;border-radius:var(--r);background:#fff;box-shadow:var(--sh);overflow:hidden;cursor:pointer;transition:all .2s;border:1px solid var(--border)}
.lb-card:hover{transform:translateY(-3px);box-shadow:var(--sh2)}
.lb-cov{height:100px;display:flex;align-items:center;justify-content:center;font-size:40px;position:relative}
.lb-cov.grimm{background:linear-gradient(135deg,#e0e7ff,#c7d2fe)}
.lb-cov.andersen{background:linear-gradient(135deg,#dbeafe,#bfdbfe)}
.lb-prem{position:absolute;top:8px;right:8px;background:var(--indigo);color:#fff;font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;letter-spacing:.5px}
.lb-inf{padding:10px 12px 12px}
.lb-cat{font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--indigo);font-weight:700;display:block;margin-bottom:3px}
.lb-tit{font-size:13px;font-weight:700;color:var(--text);line-height:1.3;font-family:'Lora',serif;display:block;margin-bottom:2px}
.lb-aut{font-size:11px;color:var(--mute);display:block}
.lb-prog{height:3px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden}
.lb-prog-fill{height:100%;background:var(--indigo);border-radius:2px}

/* BIBLIOTECA */
.pmain{padding:20px 20px 48px}
.ptit{font-family:'Lora',serif;font-size:26px;font-weight:700;margin-bottom:20px}
.lb-list{display:flex;flex-direction:column;gap:12px}
.lb-row{display:flex;align-items:center;gap:14px;background:#fff;border-radius:var(--r);padding:14px 16px;cursor:pointer;box-shadow:var(--sh);border:1px solid var(--border);transition:all .15s}
.lb-row:hover{transform:translateX(3px);box-shadow:var(--sh2)}
.lb-row.blk{opacity:.55}
.lb-rc{width:52px;height:60px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:28px;position:relative}
.lo{position:absolute;inset:0;background:rgba(15,23,42,.35);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px}
.lb-ri{flex:1;min-width:0}
.badge-pr{background:var(--indigo);color:#fff;font-size:9px;font-weight:700;padding:4px 8px;border-radius:6px;letter-spacing:.5px;white-space:nowrap}

/* ── LECTOR ── */
.lec-wrap{display:flex;flex-direction:column;min-height:100vh;background:#F9F6F0;overflow-y:auto;height:100vh}
.lec-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.btn-v{background:none;border:none;cursor:pointer;font-size:14px;font-weight:600;color:var(--indigo);font-family:'Inter',sans-serif;padding:4px 0}
.lec-th{font-size:14px;font-weight:600;color:var(--text);font-family:'Lora',serif;max-width:160px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lec-badge{display:flex;align-items:center;gap:5px;background:var(--ip);border-radius:20px;padding:5px 10px;font-size:12px;font-weight:700;color:var(--indigo)}
.prog-wrap{height:3px;background:var(--border);position:sticky;top:57px;z-index:99;flex-shrink:0}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--il),var(--indigo));transition:width .2s}
.imm-strip{background:#fff;border-bottom:1px solid var(--bs);padding:10px 16px;display:flex;align-items:center;justify-content:space-between}
.imm-strip-l{font-size:11px;color:var(--mute)}
.imm-strip-v{font-size:13px;font-weight:700;color:var(--indigo)}
.imm-strip-bar{flex:1;height:4px;background:var(--border);border-radius:2px;margin:0 12px;overflow:hidden}
.imm-strip-fill{height:100%;background:linear-gradient(90deg,var(--il),var(--indigo));border-radius:2px;transition:width .5s}
.lec-main{padding:28px 22px 60px;flex:1}
.cap-t{font-family:'Lora',serif;font-size:21px;font-weight:700;margin-bottom:6px}
.cap-lb{font-size:13px;color:var(--mute);margin-bottom:24px}
.sep{height:2px;background:linear-gradient(90deg,var(--indigo),transparent);border-radius:1px;margin-bottom:28px;width:60px}
.txt{font-family:'Lora',serif;font-size:18px;line-height:2;color:var(--text)}
.par{margin-bottom:1.4em}
.frase-idioma{color:var(--indigo);font-weight:500;cursor:pointer;background:var(--ip);border-radius:6px;padding:2px 4px;margin:-2px -4px;position:relative;transition:background .15s}
.frase-idioma:hover{background:#e0e7ff}
.tt-frase{display:none;position:absolute;top:calc(100% + 8px);left:0;right:0;background:var(--text);color:#fff;border-radius:9px;padding:10px 14px;font-size:13px;z-index:300;box-shadow:0 4px 16px rgba(0,0,0,.25);font-family:'Inter',sans-serif;pointer-events:none;font-weight:400;line-height:1.5;white-space:normal}
.tt-frase .ta{color:var(--il);font-weight:700;font-size:11px;text-transform:uppercase;margin-right:4px}
.tt-frase::before{content:'';position:absolute;bottom:100%;left:20px;border:5px solid transparent;border-bottom-color:var(--text)}
.frase-idioma:hover .tt-frase{display:block}
.to{color:rgba(255,255,255,.5);text-decoration:line-through;font-size:11px}
.ta{color:var(--il);font-size:11px}
.tn{color:#fff}
.leyenda{margin-top:36px;padding:14px 16px;background:var(--ip);border-radius:var(--rs);font-size:13px;color:var(--soft);line-height:1.6}

/* CAP NAV */
.cap-nav{display:flex;gap:10px;margin-top:36px}

/* MODAL CAMBIO IDIOMA */
.modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:500;display:flex;align-items:flex-end;justify-content:center}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:28px 24px 40px;width:100%;max-width:480px}
.modal-t{font-family:'Lora',serif;font-size:20px;font-weight:700;margin-bottom:8px}
.modal-s{font-size:14px;color:var(--soft);margin-bottom:24px;line-height:1.5}
</style>
</head>

<div id="root"></div>

const LIBROS=[
  {id:1,tit:'Blancanieves',aut:'Hermanos Grimm',cat:'Grimm',gratis:true,cov:'grimm',emo:'🍎',totalCaps:3,caps:[
    {tit:'La reina malvada',frases:[
      {es:'Había una vez, en pleno invierno, cuando los copos de nieve caían del cielo como plumas, una reina que estaba sentada cosiendo junto a una ventana con marco de ébano negro.',fr:"C'était en plein hiver, et les flocons de neige tombaient du ciel comme un duvet léger. Une reine était assise à sa fenêtre encadrée de bois d'ébène et cousait.",en:'It was the middle of winter, and the snowflakes were falling like feathers from the sky. A queen sat at a window with an ebony frame, sewing.',de:'Es war mitten im Winter, und die Schneeflocken fielen wie Federn vom Himmel. Eine Königin saß an einem Fenster mit einem Rahmen aus Ebenholz und nähte.',it:"Era pieno inverno e i fiocchi di neve cadevano dal cielo come piume. Una regina era seduta accanto a una finestra con un'intelaiatura di ebano e cuciva.",pt:'Era pleno inverno e os flocos de neve caíam do céu como penas. Uma rainha estava sentada junto a uma janela com uma moldura de ébano e costurava.',ca:"Era ple d'hivern i els flocs de neu queien del cel com plomes. Una reina estava asseguda prop d'una finestra amb un marc d'eben i cosint."},
      {es:'Mientras cosía y miraba la nieve, se pinchó el dedo con la aguja y cayeron tres gotas de sangre sobre la nieve blanca.',fr:'Comme elle cousait en regardant la neige, elle se piqua le doigt et trois gouttes de sang tombèrent sur la neige.',en:'As she was sewing and looking at the snow, she pricked her finger and three drops of blood fell onto the snow.',de:'Während sie nähte und in den Schnee schaute, stach sie sich in den Finger, und drei Blutstropfen fielen auf den Schnee.',it:'Mentre cuciva e guardava la neve, si punse il dito e tre gocce di sangue caddero sulla neve.',pt:'Enquanto costurava e olhava a neve, picou o dedo e três gotas de sangue caíram sobre a neve.',ca:'Mentre cosint i mirant la neu, es va punxar el dit i tres gotes de sang van caure sobre la neu.'},
      {es:'Pensó la reina: ojalá tuviera una hija tan blanca como la nieve, tan roja como la sangre y tan negra de cabello como el ébano de ese marco.',fr:'La reine pensa : « Oh ! si j'avais une petite fille aussi blanche que la neige, aussi vermeille que le sang et aussi noire de cheveux que l'ébène ! »',en:'The queen thought: "If only I had a child as white as snow, as red as blood, and as black as the wood of this frame."',de:'Die Königin dachte: „Hätte ich doch ein Kind so weiß wie Schnee, so rot wie Blut und so schwarz wie das Holz dieses Rahmens!"',it:'La regina pensò: «Ah, se avessi una bambina bianca come la neve, rossa come il sangue e nera di capelli come l\'ebano di questa finestra!»',pt:'A rainha pensou: «Quem me dera ter uma filha tão branca como a neve, tão vermelha como o sangue e tão negra de cabelos como o ébano desta moldura!»',ca:'La reina va pensar: «Tant de bo tingués una filla tan blanca com la neu, tan vermella com la sang i tan negra de cabells com l\'eben d\'aquest marc!»'},
      {es:'Poco después tuvo una hija de piel blanca como la nieve, mejillas rosadas como la sangre y cabello negro como el ébano. La llamaron Blancanieves. Pero cuando la niña nació, la reina madre murió.',fr:'Peu après, elle eut une petite fille blanche comme la neige, vermeille comme le sang et noire de cheveux comme l\'ébène. On l\'appela Blanche-Neige. Mais la reine mourut en la mettant au monde.',en:'Soon after, she had a daughter with skin as white as snow, cheeks as red as blood, and hair as black as ebony. She was called Snow White. But the queen died shortly after the child was born.',de:'Bald darauf bekam sie ein Töchterlein, weiß wie Schnee, rot wie Blut und schwarz wie Ebenholz. Es wurde Schneewittchen genannt. Aber die Königin starb, als das Kind geboren wurde.',it:'Ben presto ebbe una bambina bianca come la neve, rossa come il sangue e nera di capelli come l\'ebano. La chiamarono Biancaneve. Ma la regina morì dopo il parto.',pt:'Logo depois teve uma filha branca como a neve, vermelha como o sangue e negra de cabelos como o ébano. Chamaram-na Branca de Neve. Mas a rainha morreu ao dar à luz.',ca:'Poc després va tenir una filla blanca com la neu, vermella com la sang i negra de cabells com l\'eben. La van anomenar Blancaneu. Però la reina va morir en donar-la a llum.'},
      {es:'Al cabo de los años, el rey tomó una segunda esposa. Era una mujer hermosa, pero soberbia y arrogante, y no podía soportar que nadie la superase en belleza.',fr:'Au bout d'un an, le roi prit une autre femme, très belle, mais si fière et si orgueilleuse qu\'elle ne pouvait supporter qu\'une autre la surpassât en beauté.',en:'After a year had passed, the king took a second wife. She was a beautiful woman, but proud and haughty, and could not bear that anyone should surpass her in beauty.',de:'Nach einem Jahr nahm der König eine zweite Frau. Sie war eine schöne Frau, aber stolz und überheblich und konnte nicht ertragen, dass jemand schöner war als sie.',it:'Dopo un anno, il re prese una seconda moglie, bella ma superba e arrogante, che non sopportava di essere superata in bellezza.',pt:'Após um ano, o rei tomou uma segunda esposa, bela mas soberba e arrogante, que não suportava ser ultrapassada em beleza.',ca:'Al cap d\'un any, el rei va prendre una segona esposa, bella però superba i arrogant, que no suportava ser superada en bellesa.'},
      {es:'Tenía un espejo mágico, y cuando se miraba en él preguntaba: «Espejo, espejito, ¿quién es la más hermosa del reino?» Y el espejo respondía: «Vos, mi señora, sois la más hermosa del reino.»',fr:'Elle possédait un miroir magique, et quand elle allait s\'y contempler, elle demandait : « Miroir, gentil miroir, dis-moi, qui est la plus belle du royaume ? » Et le miroir répondait : « Vous êtes la plus belle du pays, Madame. »',en:'She had a magic mirror, and when she looked into it she would ask: "Mirror, mirror on the wall, who is the fairest of them all?" And the mirror would always reply: "You, my queen, are the fairest of them all."',de:'Sie hatte einen Zauberspiegel, und wenn sie sich darin betrachtete, fragte sie: „Spieglein, Spieglein an der Wand, wer ist die Schönste im ganzen Land?" Der Spiegel antwortete: „Ihr seid die Schönste im Land, Majestät."',it:'Possedeva uno specchio magico, e quando si specchiava chiedeva: «Specchio, specchio delle mie brame, chi è la più bella del reame?» E lo specchio rispondeva: «Voi, mia regina, siete la più bella del reame.»',pt:'Tinha um espelho mágico, e quando se olhava nele perguntava: «Espelho, espelho meu, quem é a mais bela do reino?» E o espelho respondia: «Vós, minha senhora, sois a mais bela do reino.»',ca:'Tenia un mirall màgic, i quan s\'hi mirava preguntava: «Mirall, mirallet, qui és la més bella del regne?» I el mirall responia: «Vós, senyora, sou la més bella del regne.»'},
      {es:'Sin embargo, Blancanieves fue creciendo y al cumplir los siete años era más hermosa que la propia reina.',fr:'Cependant, Blanche-Neige grandissait et devenait toujours plus belle. Quand elle eut sept ans, elle était plus belle que la reine elle-même.',en:'But Snow White grew up and when she turned seven years old she was as beautiful as the day and more beautiful than the queen herself.',de:'Aber Schneewittchen wuchs heran und wurde immer schöner. Als sie sieben Jahre alt war, war sie schöner als die Königin selbst.',it:'Ma Biancaneve cresceva e diventava sempre più bella. Quando compì sette anni era più bella della stessa regina.',pt:'Mas Branca de Neve crescia e tornava-se cada vez mais bela. Quando fez sete anos era mais bela do que a própria rainha.',ca:'Però Blancaneu creixia i es tornava cada vegada més bella. Quan va fer set anys era més bella que la pròpia reina.'},
      {es:'Un día el espejo respondió: «Blancanieves es mil veces más hermosa que vos.» La reina se quedó petrificada, y desde aquel momento el corazón se le llenó de envidia y odio.',fr:'Un jour, le miroir répondit : « Blanche-Neige est mille fois plus belle que vous. » La reine pâlit de rage et d\'envie. Depuis ce moment, elle ne pouvait plus voir Blanche-Neige sans que son cœur se remplisse de haine.',en:'One day the mirror replied: "Snow White is a thousand times more beautiful than you." The queen turned pale with rage and envy. From that day on, whenever she saw Snow White, her heart filled with hatred.',de:'Eines Tages antwortete der Spiegel: „Schneewittchen ist tausendmal schöner als Ihr." Die Königin erbleichte vor Wut und Neid. Von diesem Tag an hasste sie Schneewittchen.',it:'Un giorno lo specchio rispose: «Biancaneve è mille volte più bella di voi.» La regina impallidì di rabbia e invidia. Da quel giorno, ogni volta che vedeva Biancaneve, il cuore le si riempiva di odio.',pt:'Um dia o espelho respondeu: «Branca de Neve é mil vezes mais bela do que vós.» A rainha empalideceu de raiva e inveja. A partir desse dia, o coração enchia-se de ódio sempre que via Branca de Neve.',ca:'Un dia el mirall va respondre: «Blancaneu és mil vegades més bella que vós.» La reina va empal·lidir de ràbia i enveja. Des d\'aquell dia, cada vegada que veia Blancaneu, el cor se li omplia d\'odi.'}
    ]},
    {tit:'La huida al bosque',frases:[
      {es:'De repente, la reina llamó a un cazador y le ordenó llevarse a la niña al bosque oscuro y matarla.',fr:'Soudain, la reine fit appeler un chasseur et lui ordonna d\'emmener l\'enfant dans la forêt sombre et de la tuer.',en:'Suddenly, the queen summoned a hunter and ordered him to take the child into the dark forest and kill her.',de:'Plötzlich rief die Königin einen Jäger zu sich und befahl ihm, das Kind in den dunklen Wald zu bringen und es zu töten.',it:"All'improvviso, la regina chiamò un cacciatore e gli ordinò di portare la bambina nel bosco oscuro e di ucciderla.",pt:'De repente, a rainha chamou um caçador e ordenou-lhe que levasse a criança para a floresta escura e a matasse.',ca:"De sobte, la reina va cridar un caçador i li va ordenar que portés la nena al bosc fosc i la matés."},
      {es:'Pero cuando el cazador ya iba a sacar su cuchillo, Blancanieves se echó a llorar y le rogó que la dejase con vida.',fr:'Mais quand le chasseur tira son couteau, Blanche-Neige se mit à pleurer et le supplia de lui laisser la vie sauve.',en:'But when the hunter drew his knife, Snow White began to cry and begged him to spare her life.',de:'Aber als der Jäger sein Messer zog, fing Schneewittchen zu weinen an und bat ihn, ihr das Leben zu lassen.',it:'Ma quando il cacciatore estrasse il coltello, Biancaneve scoppiò a piangere e lo supplicò di lasciarla in vita.',pt:'Mas quando o caçador tirou a faca, Branca de Neve começou a chorar e implorou-lhe que a deixasse viver.',ca:'Però quan el caçador va treure el ganivet, Blancaneu va posar-se a plorar i li va implorar que la deixés viure.'},
      {es:'Como era tan hermosa, el cazador se apiadó de ella y la dejó correr hacia el bosque.',fr:'Elle était si belle que le chasseur s\'apitoya et lui dit : « Sauve-toi, pauvre enfant ! » Et il la laissa partir dans la forêt.',en:'She was so beautiful that the hunter took pity on her and said: "Run away, poor child!" And he let her go into the forest.',de:'Sie war so schön, dass der Jäger Mitleid mit ihr hatte und sagte: „Lauf weg, armes Kind!" Und er ließ sie in den Wald laufen.',it:'Era così bella che il cacciatore si impietosì e disse: «Scappa, povera bambina!» E la lasciò correre nel bosco.',pt:'Era tão bela que o caçador se apiedou dela e disse: «Foge, pobre criança!» E deixou-a correr para a floresta.',ca:'Era tan bella que el caçador es va apidar d\'ella i li va dir: «Fuig, pobra criatura!» I la va deixar córrer cap al bosc.'},
      {es:'Así Blancanieves se encontró sola en el gran bosque oscuro. Tuvo mucho miedo y corrió sobre las piedras y entre los matorrales.',fr:'Ainsi, Blanche-Neige se retrouva seule dans la grande forêt sombre. Elle eut très peur et courut sur les pierres pointues et à travers les épines.',en:'So Snow White found herself alone in the great dark forest. She was terrified and ran over sharp stones and through thorny bushes.',de:'So fand sich Schneewittchen allein im großen dunklen Wald. Sie hatte große Angst und rannte über spitze Steine und durch Dornengestrüpp.',it:'Così Biancaneve si trovò sola nel grande bosco oscuro. Aveva molta paura e corse su pietre aguzze e tra i cespugli spinosi.',pt:'Assim, Branca de Neve ficou sozinha na grande floresta escura. Tinha muito medo e correu sobre pedras pontiagudas e entre arbustos espinhosos.',ca:'Així, Blancaneu es va trobar sola al gran bosc fosc. Va tenir molta por i va córrer sobre pedres punxegudes i entre arbusts espinosos.'},
      {es:'Los animales salvajes pasaban a su lado sin hacerle daño. Corrió todo cuanto le alcanzaron las piernas.',fr:'Les bêtes féroces bondissaient à côté d\'elle, mais sans lui faire aucun mal. Elle courut aussi longtemps que ses pieds purent la porter.',en:'The wild animals sprang past her but did her no harm. She ran as long as her legs could carry her.',de:'Die wilden Tiere sprangen an ihr vorbei, taten ihr aber keinen Schaden. Sie lief, so lange ihre Beine sie trugen.',it:'Le bestie feroci le saltavano accanto senza farle del male. Corse finché le gambe la ressero.',pt:'As feras selvagens passavam ao seu lado sem lhe fazer mal. Correu enquanto as pernas a aguentaram.',ca:'Les feres salvatges passaven al seu costat sense fer-li mal. Va córrer mentre les cames li aguantaren.'},
      {es:'Cuando ya anochecía, divisó a lo lejos una casita pequeña y entró en ella para descansar.',fr:'Quand la nuit commençait à tomber, elle aperçut au loin une petite maisonnette et entra pour se reposer.',en:'As evening fell, she saw a little cottage in the distance and went in to rest.',de:'Als es Abend wurde, sah sie in der Ferne ein kleines Häuschen und ging hinein, um sich auszuruhen.',it:'Quando si fece sera, vide in lontananza una casetta e vi entrò per riposarsi.',pt:'Quando começou a escurecer, avistou ao longe uma casinha e entrou para descansar.',ca:'Quan es va fer fosc, va divisar a la llunyania una caseta i hi va entrar per descansar.'},
      {es:'En la casita todo era diminuto pero tan bonito y tan limpio que no hay palabras para describirlo.',fr:'Dans la maisonnette, tout était petit, mais si joli et si propre qu\'on ne saurait le décrire.',en:'Inside the cottage everything was small but so neat and clean that it was beyond description.',de:'Im Häuschen war alles klein, aber so hübsch und sauber, dass es nicht zu beschreiben war.',it:'Nella casetta tutto era piccolo ma così grazioso e pulito che non si saprebbe descriverlo.',pt:'Lá dentro tudo era pequeno mas tão bonito e limpo que não há palavras para descrever.',ca:'A la caseta tot era petit però tan bonic i net que no es pot descriure.'},
      {es:'Había una mesita cubierta con un mantel blanco, siete platitos, siete jarritas, siete cuchillos y siete tenedores. Contra la pared había siete camitas con sábanas blancas como la nieve.',fr:'Il y avait une petite table recouverte d\'une nappe blanche avec sept petites assiettes, sept petits couteaux, sept petites fourchettes et sept petits gobelets. Contre le mur, il y avait sept petits lits couverts de draps blancs comme la neige.',en:'There was a little table covered with a white cloth with seven little plates, seven little knives and forks, and seven little cups. Against the wall stood seven little beds covered with sheets as white as snow.',de:'Es gab ein kleines Tisch, bedeckt mit einem weißen Tuch, mit sieben kleinen Tellern, sieben kleinen Messern und Gabeln und sieben kleinen Bechern. An der Wand standen sieben kleine Betten mit weißen Laken.',it:'C\'era un tavolino coperto da una tovaglia bianca con sette piattini, sette coltellini, sette forchettine e sette bicchierini. Contro il muro c\'erano sette lettini ricoperti di lenzuola bianche come la neve.',pt:'Havia uma mesinha coberta com uma toalha branca com sete pratinhos, sete facas, sete garfos e sete copos. Junto à parede havia sete caminhas com lençóis brancos como a neve.',ca:'Hi havia una tauleta coberta amb un mantell blanc amb set platets, set ganivets, set forquilles i set tasses. Contra la paret hi havia set llitons amb llençols blancs com la neu.'},
      {es:'Blancanieves, que tenía mucha hambre y sed, comió un poquito de cada plato, bebió un sorbo de cada jarrita, y al final se durmió en la séptima camita.',fr:'Blanche-Neige, qui avait très faim et très soif, mangea un peu dans chaque assiette et but une gorgée dans chaque gobelet. Fatiguée, elle s\'allongea dans le septième lit et s\'endormit.',en:'Snow White, who was very hungry and thirsty, ate a little from each plate and drank a little from each cup. Tired, she lay down in the seventh bed and fell asleep.',de:'Schneewittchen, das sehr hungrig und durstig war, aß ein wenig von jedem Teller und trank aus jedem Becher. Müde legte sie sich ins siebte Bett und schlief ein.',it:'Biancaneve, che aveva molta fame e sete, mangiò un po\'da ogni piatto e bevve un sorso da ogni bicchierino. Stanca, si sdraiò nel settimo lettino e si addormentò.',pt:'Branca de Neve, que estava com muita fome e sede, comeu um pouco de cada prato e bebeu um gole de cada copo. Cansada, deitou-se na sétima caminha e adormeceu.',ca:'Blancaneu, que tenia molta gana i set, va menjar una mica de cada plat i va beure un glop de cada tassa. Cansada, es va ajeure al setè llitet i es va adormir.'}
    ]},
    {tit:'Los siete enanitos',frases:[
      {es:'Por fin llegaron los dueños de la casita: los siete enanitos que trabajaban cavando en las montañas.',fr:'Enfin arrivèrent les maîtres de la maisonnette : c\'étaient les sept nains qui travaillaient dans la montagne.',en:'At last the owners of the cottage came home: they were the seven dwarfs who dug in the mountains for ore.',de:'Endlich kamen die Herren des Häuschens nach Hause: das waren die sieben Zwerge, die in den Bergen nach Erz gruben.',it:'Infine arrivarono i padroni della casetta: erano i sette nani che lavoravano scavando nelle montagne.',pt:'Por fim chegaram os donos da casinha: eram os sete anões que trabalhavam nas montanhas.',ca:'Per fi van arribar els amos de la caseta: eren els set nans que treballaven a les muntanyes.'},
      {es:'Encendieron sus velitas y vieron que alguien había estado allí. El séptimo, al mirar su cama, encontró a Blancanieves dormida. Los demás acudieron corriendo.',fr:'Ils allumèrent leurs petites lampes et virent que quelqu\'un était venu. Le septième, en regardant son lit, aperçut Blanche-Neige qui dormait. Les autres accoururent.',en:'They lit their little lamps and saw that someone had been there. The seventh, looking at his bed, found Snow White sleeping. The others came running.',de:'Sie zündeten ihre kleinen Lampen an und sahen, dass jemand da gewesen war. Der siebte fand Schneewittchen in seinem Bett schlafend. Die anderen kamen herbeigelaufen.',it:'Accesero le loro lampade e videro che qualcuno era stato lì. Il settimo, guardando il suo letto, trovò Biancaneve addormentata. Gli altri accorsero.',pt:'Acenderam as suas luzinhas e viram que alguém tinha estado ali. O sétimo, ao olhar para a sua cama, encontrou Branca de Neve a dormir. Os outros acudiram a correr.',ca:'Van encendre les seves llumetetes i van veure que algú havia estat allà. El setè, en mirar el seu llit, va trobar Blancaneu dormida. Els altres van acudir corrents.'},
      {es:'Como era tan hermosa, decidieron no despertarla. A la mañana siguiente, Blancanieves les contó su historia.',fr:'Elle était si belle qu\'ils décidèrent de ne pas la réveiller. Le lendemain matin, Blanche-Neige leur raconta son histoire.',en:'She was so beautiful that they decided not to wake her. The next morning, Snow White told them her story.',de:'Sie war so schön, dass sie beschlossen, sie nicht zu wecken. Am nächsten Morgen erzählte Schneewittchen ihnen ihre Geschichte.',it:'Era così bella che decisero di non svegliarla. Il mattino dopo, Biancaneve raccontò loro la sua storia.',pt:'Era tão bela que decidiram não a acordar. Na manhã seguinte, Branca de Neve contou-lhes a sua história.',ca:'Era tan bella que van decidir no despertar-la. L\'endemà al matí, Blancaneu els va explicar la seva història.'},
      {es:'Los enanitos le ofrecieron quedarse con ellos: si cuidas la casa y cocinas para nosotros, podrás vivir aquí sin ningún peligro.',fr:'Les nains lui proposèrent de rester chez eux : « Si tu t\'occupes de la maison et tu cuisines pour nous, tu pourras vivre ici en toute sécurité. »',en:'The dwarfs offered her a place to stay: "If you keep house for us and cook, you can stay here and no harm will come to you."',de:'Die Zwerge boten ihr an, bei ihnen zu bleiben: „Wenn du unseren Haushalt führst und kochst, kannst du hier in Sicherheit leben."',it:'I nani le proposero di restare con loro: «Se ti occupi della casa e cucini per noi, potrai vivere qui senza alcun pericolo.»',pt:'Os anões ofereceram-lhe ficar com eles: «Se cuidares da casa e cozinhares para nós, poderás viver aqui sem qualquer perigo.»',ca:'Els nans li van oferir quedar-se amb ells: «Si cuides la casa i cuines per a nosaltres, podràs viure aquí sense cap perill.»'},
      {es:'Blancanieves aceptó de buen corazón y así vivió feliz con los enanitos.',fr:'Blanche-Neige accepta de bon cœur et vécut ainsi heureuse avec les sept nains.',en:'Snow White agreed with all her heart and so she lived happily with the seven dwarfs.',de:'Schneewittchen stimmte von ganzem Herzen zu und lebte so glücklich mit den sieben Zwergen.',it:'Biancaneve accettò di buon cuore e così visse felice con i sette nani.',pt:'Branca de Neve aceitou de bom coração e assim viveu feliz com os sete anões.',ca:'Blancaneu va acceptar de bon cor i així va viure feliç amb els set nans.'},
      {es:'Sin embargo, la malvada reina consultó de nuevo su espejo mágico y descubrió que Blancanieves seguía viva en el bosque.',fr:'Cependant, la méchante reine interrogea à nouveau son miroir magique et découvrit que Blanche-Neige était toujours en vie dans la forêt.',en:'However, the wicked queen consulted her magic mirror again and discovered that Snow White was still alive in the forest.',de:'Jedoch befragte die böse Königin wieder ihren Zauberspiegel und erfuhr, dass Schneewittchen noch am Leben war.',it:'Tuttavia, la malvagia regina interrogò di nuovo il suo specchio magico e scoprì che Biancaneve era ancora viva nel bosco.',pt:'No entanto, a malvada rainha consultou novamente o seu espelho mágico e descobriu que Branca de Neve ainda estava viva na floresta.',ca:'Tanmateix, la malvada reina va consultar de nou el seu mirall màgic i va descobrir que Blancaneu seguia viva al bosc.'},
      {es:'Ardiendo de envidia, disfrazó su hermosa cara con la de una anciana y se dirigió a la casita.',fr:'Brûlant d\'envie, elle se déguisa en vieille femme et se dirigea vers la maisonnette.',en:'Burning with envy, she disguised herself as an old woman and made her way to the little cottage.',de:'Vor Neid brennend, verkleidete sie sich als alte Frau und machte sich auf den Weg zur kleinen Hütte.',it:'Ardendo d\'invidia, si travestì da vecchia e si diresse verso la casetta.',pt:'Ardendo de inveja, disfarçou-se de velha e dirigiu-se à casinha.',ca:'Ardent d\'enveja, es va disfressar de vella i es va dirigir cap a la caseta.'},
      {es:'Llamó a la puerta ofreciendo manzanas rojas y brillantes. Blancanieves, que no reconoció a la reina disfrazada, aceptó una manzana envenenada y cayó al suelo sin vida.',fr:'Elle frappa à la porte en proposant de belles pommes rouges. Blanche-Neige, qui ne reconnut pas la reine déguisée, accepta une pomme empoisonnée et tomba sans vie sur le sol.',en:'She knocked at the door offering beautiful red apples. Snow White, who did not recognise the disguised queen, accepted a poisoned apple and fell lifeless to the ground.',de:'Sie klopfte an die Tür und bot schöne rote Äpfel an. Schneewittchen, die die verkleidete Königin nicht erkannte, nahm einen vergifteten Apfel und fiel leblos zu Boden.',it:'Bussò alla porta offrendo belle mele rosse. Biancaneve, che non riconobbe la regina travestita, accettò una mela avvelenata e cadde a terra senza vita.',pt:'Bateu à porta oferecendo belas maçãs vermelhas. Branca de Neve, que não reconheceu a rainha disfarçada, aceitou uma maçã envenenada e caiu no chão sem vida.',ca:'Va trucar a la porta oferint belles pomes vermelles. Blancaneu, que no va reconèixer la reina disfressada, va acceptar una poma enverinada i va caure a terra sense vida.'}
    ]}
  ]},
  {id:2,tit:'La Sirenita',aut:'H.C. Andersen',cat:'Andersen',gratis:true,cov:'andersen',emo:'🌊',totalCaps:2,caps:[
    {tit:'El fondo del mar',frases:[
      {es:'Había una vez, muy lejos en alta mar, donde el agua es tan azul como los pétalos del aciano más hermoso y tan transparente como el cristal, un lugar muy profundo donde ningún ancla había llegado jamás.',fr:'Il était une fois, bien loin dans la mer, là où l\'eau est aussi bleue que les pétales du bleuet le plus beau et aussi transparente que le cristal, un endroit si profond qu\'aucune ancre n\'y avait jamais touché le fond.',en:'Far out in the ocean, where the water is as blue as the prettiest cornflower and as clear as crystal, it is very deep, so deep that no cable could fathom it.',de:'Weit draußen im Meer ist das Wasser so blau wie die Blätter der schönsten Kornblume und so klar wie das reinste Glas. Es ist sehr tief, so tief, dass kein Ankertau den Boden erreichen kann.',it:'Molto lontano in mare aperto, dove l\'acqua è così blu come i petali del fiordaliso più bello e trasparente come il cristallo, c\'è un posto profondissimo dove nessun\'ancora è mai arrivata.',pt:'Muito longe no mar alto, onde a água é tão azul como as pétalas do mais belo cardo e tão transparente como o cristal, existe um lugar tão profundo que nenhuma âncora jamais lá chegou.',ca:'Molt lluny en alta mar, on l\'aigua és tan blava com els pètals del blauet més bell i tan transparent com el cristall, hi ha un lloc tan profund que cap àncora no hi havia arribat mai.'},
      {es:'Allá en el fondo vivían las gentes del mar. El palacio del Rey del Mar tenía paredes de coral y ventanas de ámbar amarillo.',fr:'Au fond de la mer vivaient les habitants des eaux. Le palais du roi des mers avait des murs de corail et des fenêtres d\'ambre jaune.',en:'At the bottom of the sea lived the people of the sea. The palace of the Sea King had walls of coral and windows of clear amber.',de:'Auf dem Grund des Meeres lebten die Seeleute. Der Palast des Meerkönigs hatte Wände aus Korallen und Fenster aus klarem Bernstein.',it:'In fondo al mare vivevano le genti del mare. Il palazzo del Re del Mare aveva mura di corallo e finestre di ambra gialla.',pt:'No fundo do mar viviam as gentes do mar. O palácio do Rei do Mar tinha paredes de coral e janelas de âmbar amarelo.',ca:'Al fons del mar vivien les gents del mar. El palau del Rei del Mar tenia parets de corall i finestres d\'ambre groc.'},
      {es:'El rey llevaba muchos años viudo, y su anciana madre cuidaba del palacio y de sus seis nietas.',fr:'Le roi était veuf depuis de longues années, et sa vieille mère s\'occupait du palais et de ses six petites-filles.',en:'The king had been a widower for many years, and his old mother kept house for him and looked after his six granddaughters.',de:'Der König war seit vielen Jahren Witwer, und seine alte Mutter führte den Haushalt und kümmerte sich um seine sechs Enkeltöchter.',it:'Il re era rimasto vedovo da molti anni e sua madre anziana si occupava del palazzo e delle sue sei nipoti.',pt:'O rei estava viúvo há muitos anos e a sua velha mãe cuidava do palácio e das suas seis netas.',ca:'El rei feia molts anys que era vidu, i la seva vella mare cuidava el palau i les seves sis nétes.'},
      {es:'La más joven era la más hermosa de todas. Tenía la piel suave como un pétalo de rosa y los ojos azules y profundos como el mar más hondo. Sin embargo, como todas las demás, no tenía pies: su cuerpo terminaba en cola de pez.',fr:'La plus jeune était la plus belle de toutes. Sa peau était douce comme un pétale de rose et ses yeux bleus et profonds comme la mer la plus profonde. Cependant, comme toutes les autres, elle n\'avait pas de pieds : son corps se terminait en queue de poisson.',en:'The youngest was the most beautiful of all. Her skin was as soft as a rose petal and her eyes were as blue and deep as the deepest sea. But like all the others, she had no feet: her body ended in a fish\'s tail.',de:'Die Jüngste war die Schönste von allen. Ihre Haut war so weich wie ein Rosenblatt und ihre Augen so blau und tief wie das tiefste Meer. Aber wie alle anderen hatte sie keine Füße, ihr Körper endete in einem Fischschwanz.',it:'La più giovane era la più bella di tutte. La sua pelle era morbida come un petalo di rosa e i suoi occhi erano azzurri e profondi come il mare più profondo. Eppure, come tutte le altre, non aveva piedi: il suo corpo terminava in coda di pesce.',pt:'A mais jovem era a mais bela de todas. A sua pele era suave como uma pétala de rosa e os seus olhos eram azuis e profundos como o mar mais fundo. No entanto, como todas as outras, não tinha pés: o seu corpo terminava em cauda de peixe.',ca:'La més jove era la més bella de totes. La seva pell era suau com un pètal de rosa i els seus ulls eren blaus i profunds com el mar més fons. Però, com totes les altres, no tenia peus: el seu cos acabava en cua de peix.'},
      {es:'Cada una de las princesas tenía su propio jardín. La más pequeña plantó el suyo de flores de color rojo como el sol.',fr:'Chacune des princesses avait son propre jardin. La plus petite planta le sien de fleurs couleur rouge comme le soleil.',en:'Each of the princesses had her own little garden. The smallest planted hers with flowers as red as the sun.',de:'Jede der Prinzessinnen hatte ihren eigenen kleinen Garten. Die Kleinste bepflanzte ihren Garten mit Blumen so rot wie die Sonne.',it:'Ognuna delle principesse aveva il proprio giardino. La più piccola piantò il suo di fiori rossi come il sole.',pt:'Cada uma das princesas tinha o seu próprio jardim. A mais pequena plantou o seu com flores vermelhas como o sol.',ca:'Cadascuna de les princeses tenia el seu propi jardí. La més petita va plantar el seu amb flors vermelles com el sol.'},
      {es:'En el centro colocó una hermosa estatua de mármol blanco que representaba a un joven muchacho, caída al fondo del mar desde un naufragio. Junto a ella plantó un sauce rosado que colgaba sus ramas sobre la figura como un manto.',fr:'Au centre, elle plaça une belle statue de marbre blanc représentant un jeune garçon tombée au fond de la mer depuis un naufrage. À côté, elle planta un saule rose dont les branches tombaient sur la statue comme un manteau.',en:'In the center she placed a beautiful white marble statue of a boy which had sunk to the bottom of the sea from a shipwreck. Beside it she planted a rose-pink willow tree that drooped its branches over the figure like a cloak.',de:'In der Mitte stellte sie eine schöne weiße Marmorstatue eines Jungen auf, die von einem Schiffswreck auf den Meeresgrund gesunken war. Daneben pflanzte sie eine rosafarbene Weide, deren Äste sich wie ein Mantel über die Figur legten.',it:'Al centro aveva posto una bella statua di marmo bianco raffigurante un giovane ragazzo, caduta sul fondo del mare da un naufragio. Accanto aveva piantato un salice rosato i cui rami ricadevano sulla figura come un manto.',pt:'No centro tinha colocado uma bela estátua de mármore branco de um rapaz, que tinha afundado no mar de um naufrágio. Ao lado tinha plantado um salgueiro cor-de-rosa cujos ramos pendiam sobre a figura como um manto.',ca:'Al centre havia col·locat una bella estàtua de marbre blanc d\'un noi, que havia caigut al fons del mar des d\'un naufràgi. Al costat havia plantat un salze rosa les branques del qual queien sobre la figura com un mantell.'}
    ]},
    {tit:'El mundo de arriba',frases:[

// ── MEZCLA ────────────────────────────────────────────────────────────────────
function calcPct(capIdx,totalCaps,isPrem){
  const min=20, maxFree=60, maxPrem=90;
  const max=isPrem?maxPrem:maxFree;
  if(totalCaps<=1)return min;
  return Math.round(min+(max-min)*(capIdx/(totalCaps-1)));
}

// Calcula el % real de palabras traducidas (ocurrencias, no keys únicas)
function calcImmReal(toks){
  if(!toks||!toks.length)return 0;
  const palabras=toks.filter(t=>t.r==='n'||t.r==='k'||(t.r==='p'&&t.orig&&t.orig.match(/[a-záéíóúüñA-ZÁÉÍÓÚÜÑ]/)));
  if(!palabras.length)return 0;
  const traducidas=palabras.filter(t=>t.r==='n'||t.r==='k').length;
  return Math.round((traducidas/palabras.length)*100);
}

// Tokeniza el texto en expresiones/palabras/literales — SIN aleatorio
function tokenizar(txt,idioma){
  const tokens=[];let i=0;
  while(i<txt.length){
    let matched=false;
    for(const e of EXPR){
      if(txt.substring(i).toLowerCase().startsWith(e.es)&&e[idioma]){
        // Verificar que no sea parte de una palabra más larga
        const after=txt[i+e.es.length];
        if(!after||!after.match(/[a-záéíóúüñA-ZÁÉÍÓÚÜÑ]/)){
          tokens.push({tipo:'e',orig:txt.substring(i,i+e.es.length),trad:e[idioma],key:e.es,prio:e.prio||0});
          i+=e.es.length;matched=true;break;
        }
      }
    }
    if(matched)continue;
    const wm=txt.substring(i).match(/^[a-záéíóúüñA-ZÁÉÍÓÚÜÑ]+/);
    if(wm){
      tokens.push({tipo:'w',txt:wm[0]});
      i+=wm[0].length;
    } else{tokens.push({tipo:'l',txt:txt[i]});i++;}
  }
  return tokens;
}

// Elige qué tokens concretos se traducen — control preciso de ocurrencias
function elegirTraducidas(tokens,pct){
  const ocurr=tokens.filter(t=>t.tipo==='e');
  if(!ocurr.length)return new Set();
  const objetivo=Math.round(ocurr.length*(pct/100));

  // Separar prioritarios y normales
  const prios=ocurr.filter(t=>(t.prio||0)>0);
  const normales=ocurr.filter(t=>(t.prio||0)===0);

  // Mezclar normales aleatoriamente para variar cada capítulo
  normales.sort(()=>Math.random()-.5);

  // Construir lista ordenada: primero prioritarios, luego normales
  const candidatos=[...prios,...normales];

  // Seleccionar token a token hasta llegar al objetivo EXACTO
  // Usamos índices de posición en el array tokens original para rastrear cada ocurrencia
  const elegidosIdx=new Set();
  let count=0;
  for(const t of candidatos){
    if(count>=objetivo)break;
    // Encontrar el índice de este token en el array original
    const idx=tokens.indexOf(t);
    if(!elegidosIdx.has(idx)){
      elegidosIdx.add(idx);
      count++;
    }
  }
  return elegidosIdx; // Set de índices, no de keys
}

// Renderiza tokens aplicando elegidas (por índice) + aprendidas (por key)
function aplicarEstado(tokens,elegidas,aprd){
  return tokens.map((t,idx)=>{
    if(t.tipo==='l'||t.tipo==='w')return{r:'p',txt:t.txt||t.orig};
    const ya=aprd.has(t.key);
    const sel=elegidas.has(idx);
    return{r:ya?'k':(sel?'n':'p'),orig:t.orig,trad:t.trad,key:t.key};
  });
}

// ── SISTEMA DE FRASES BILINGÜE ────────────────────────────────────────────────
// Elige qué frases mostrar en el idioma objetivo según el % de inmersión
function elegirFrasesIdioma(frases, pct, idioma){
  if(!frases||!frases.length)return [];
  const total=frases.length;
  const nObjetivo=Math.round(total*(pct/100));
  // Siempre elegimos las últimas N frases del capítulo en idioma (inmersión progresiva natural)
  // Las primeras en español para anclar contexto, las últimas en idioma para reto creciente
  const elegidas=new Set();
  // Distribuir uniformemente: cada N/nObjetivo frases, una en idioma
  if(nObjetivo<=0)return frases.map((_,i)=>({idx:i,lang:'es'}));
  if(nObjetivo>=total)return frases.map((_,i)=>({idx:i,lang:idioma}));
  
  // Elegir aleatoriamente pero respetando el % — se fija al cargar el capítulo
  const indices=[...Array(total).keys()];
  // shuffle determinista: usamos un seed basado en el contenido de la primera frase
  const seed=frases[0].es.length*total;
  const shuffled=indices.sort((a,b)=>((a*seed+7)%total)-((b*seed+3)%total));
  const elegidosSet=new Set(shuffled.slice(0,nObjetivo));
  
  return frases.map((_,i)=>({idx:i,lang:elegidosSet.has(i)?idioma:'es'}));
}

function calcImmFrases(plan){
  if(!plan||!plan.length)return 0;
  const nIdioma=plan.filter(p=>p.lang!=='es').length;
  return Math.round((nIdioma/plan.length)*100);
}

// Componente frase en idioma objetivo con tooltip de traducción al ES
function FraseIdioma({frase, idioma}){
  const [hov,setHov]=useState(false);
  const txt=frase[idioma]||frase.es;
  return h('p',{
    className:'par frase-idioma',
    onMouseEnter:()=>setHov(true),
    onMouseLeave:()=>setHov(false),
    onTouchStart:e=>{e.preventDefault();setHov(v=>!v);},
    style:{position:'relative'}
  },
    txt,
    hov&&h('span',{className:'tt-frase'},
      h('span',{className:'ta'},'ES'),
      ' ',
      frase.es
    )
  );
}

function renderFrases(frases, plan, idioma){
  if(!frases||!plan)return null;
  return frases.map((f,i)=>{
    const p=plan[i];
    if(!p)return null;
    if(p.lang==='es') return h('p',{key:i,className:'par'},f.es);
    return h(FraseIdioma,{key:i,frase:f,idioma});
  });
}



// ── AUTH HOOK ─────────────────────────────────────────────────────────────────
function useAuth(){
  const [user,setUser]=useState(()=>{try{return JSON.parse(localStorage.getItem('tx_u')||'null');}catch{return null;}});
  function reg(name,email,pw,idiomas){
    const us=JSON.parse(localStorage.getItem('tx_us')||'{}');
    if(us[email])return{error:'Este email ya está registrado.'};
    // idiomas = array, idioma activo = primero
    const idiomasArr=Array.isArray(idiomas)?idiomas:[idiomas];
    const u={name,email,racha:0,idiomas:idiomasArr,idioma:idiomasArr[0],progreso:{}};
    us[email]={...u,pw};
    localStorage.setItem('tx_us',JSON.stringify(us));
    localStorage.setItem('tx_u',JSON.stringify(u));
    setUser(u);return{ok:true};
  }
  function login(email,pw){
    const us=JSON.parse(localStorage.getItem('tx_us')||'{}');
    const u=us[email];
    if(!u||u.pw!==pw)return{error:'Email o contraseña incorrectos.'};
    // Migrar usuarios antiguos que solo tienen idioma string
    const idiomasArr=u.idiomas||[u.idioma||'en'];
    const nu={name:u.name,email,racha:u.racha||0,idiomas:idiomasArr,idioma:u.idioma||idiomasArr[0],progreso:u.progreso||{}};
    localStorage.setItem('tx_u',JSON.stringify(nu));setUser(nu);return{ok:true};
  }
  function logout(){localStorage.removeItem('tx_u');setUser(null);}
  function upd(c){
    const nu={...user,...c};
    localStorage.setItem('tx_u',JSON.stringify(nu));
    // Sync to users store too
    const us=JSON.parse(localStorage.getItem('tx_us')||'{}');
    if(us[nu.email])us[nu.email]={...us[nu.email],...c};
    localStorage.setItem('tx_us',JSON.stringify(us));
    setUser(nu);
  }
  function addIdioma(id){
    if((user.idiomas||[]).includes(id))return;
    const idiomasArr=[...(user.idiomas||[user.idioma]),id];
    upd({idiomas:idiomasArr});
  }
  function removeIdioma(id){
    let idiomasArr=(user.idiomas||[user.idioma]).filter(i=>i!==id);
    if(!idiomasArr.length)return; // siempre al menos uno
    const nuIdioma=user.idioma===id?idiomasArr[0]:user.idioma;
    upd({idiomas:idiomasArr,idioma:nuIdioma});
  }
  function switchIdioma(id){upd({idioma:id});}
  return{user,reg,login,logout,upd,addIdioma,removeIdioma,switchIdioma};

}

// ── REGISTRO ──────────────────────────────────────────────────────────────────
function Registro({onReg,onLogin}){
  const [paso,setPaso]=useState(1);
  const [name,setName]=useState('');const [email,setEmail]=useState('');const [pw,setPw]=useState('');
  const [idiomas,setIdiomas]=useState([]);const [err,setErr]=useState('');

  function toggleIdioma(id){
    setIdiomas(prev=>prev.includes(id)?prev.filter(i=>i!==id):[...prev,id]);
    setErr('');
  }
  function paso1(){
    if(!name.trim())return setErr('Escribe tu nombre.');
    if(!email.includes('@'))return setErr('Email no válido.');
    if(pw.length<6)return setErr('Mínimo 6 caracteres.');
    setErr('');setPaso(2);
  }
  function paso2(){
    if(!idiomas.length)return setErr('Elige al menos un idioma.');
    const r=onReg(name,email,pw,idiomas);
    if(r.error)setErr(r.error);
  }

  return h('div',{className:'auth'},
    h('div',{className:'auth-logo',onClick:onLogin,style:{cursor:'pointer'}},
      h('span',{className:'logo-text'},h('span',{className:'lt'},'T'),'ALIXEA')),
    h('div',{className:'auth-card'},
      paso===1?[
        h('button',{key:'back',onClick:onLogin,style:{background:'none',border:'none',cursor:'pointer',color:'var(--soft)',fontSize:13,fontFamily:'Inter,sans-serif',marginBottom:16,padding:0,display:'flex',alignItems:'center',gap:4}},'← Volver'),
        h('h1',{key:'t',className:'auth-title'},'Crea tu cuenta'),
        h('p',{key:'s',className:'auth-sub'},'Empieza a aprender idiomas leyendo. Es gratis.'),
        err&&h('div',{key:'e',className:'auth-err'},err),
        h('div',{key:'n',className:'fg'},h('label',null,'Nombre'),h('input',{type:'text',value:name,onChange:e=>setName(e.target.value),placeholder:'Tu nombre'})),
        h('div',{key:'em',className:'fg'},h('label',null,'Email'),h('input',{type:'email',value:email,onChange:e=>setEmail(e.target.value),placeholder:'tu@email.com'})),
        h('div',{key:'pw',className:'fg'},h('label',null,'Contraseña'),h('input',{type:'password',value:pw,onChange:e=>setPw(e.target.value),placeholder:'Mínimo 6 caracteres',onKeyDown:e=>e.key==='Enter'&&paso1()})),
        h('button',{key:'btn',className:'btn-p',onClick:paso1},'Continuar →'),
        h('div',{key:'f',className:'auth-foot'},'¿Ya tienes cuenta? ',h('button',{className:'lnk',onClick:onLogin},'Inicia sesión'))
      ]:[
        h('h1',{key:'t',className:'auth-title'},'¿Qué idiomas quieres aprender?'),
        h('p',{key:'s',className:'auth-sub'},'Puedes elegir uno o varios. Cada idioma guarda su propio progreso.'),
        err&&h('div',{key:'e',className:'auth-err'},err),
        h('div',{key:'g',className:'lang-grid'},
          IDIOMAS.map(id=>h('div',{key:id.id,className:`lang-opt ${idiomas.includes(id.id)?'on':''}`,onClick:()=>toggleIdioma(id.id)},
            h('div',{className:'lang-flag'},h(Flag,{id:id.id})),
            h('div',{style:{flex:1}},h('span',{className:'lang-name'},id.n)),
            idiomas.includes(id.id)&&h('span',{style:{color:'var(--indigo)',fontWeight:700,fontSize:16}},'✓')))),

      h('p',{className:'cap-lb'},`${libro?.aut} · ${libro?.cat} · Capítulo ${cap+1} de ${libro?.totalCaps}`),
      h('div',{className:'sep'}),
      h('div',{className:'txt'},renderFrases(capObj?.frases,planFrases,user.idioma)),
      h('div',{className:'cap-nav'},
        cap>0&&h('button',{className:'btn-g',onClick:()=>{setCap(v=>v-1);lRef.current?.scrollTo(0,0);}},'← Capítulo anterior'),
        cap<libro.totalCaps-1&&h('button',{className:'btn-p',onClick:()=>{setCap(v=>v+1);lRef.current?.scrollTo(0,0);}},'Siguiente capítulo →')),
      h('div',{className:'leyenda'},
        h('span',{style:{display:'inline-block',background:'var(--ip)',border:'1.5px solid var(--indigo)',borderRadius:6,padding:'2px 8px',color:'var(--indigo)',fontWeight:600,fontSize:13}},'Frase en color'),
        ' = en ',IDIOMAS.find(i=>i.id===user.idioma)?.n||'el idioma objetivo','. Pasa el ratón o toca para ver la traducción en español.'))
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
