<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Talixea</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F9F6F0;--text:#1E293B;--soft:#64748B;--mute:#94A3B8;
  --indigo:#6366F1;--indigo-l:#818CF8;--indigo-pale:#EEF2FF;--indigo-d:#4F46E5;
  --white:#fff;--border:#E2E8F0;--border-s:#F1F5F9;
  --sh:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.06);
  --sh2:0 4px 8px rgba(0,0,0,.08),0 12px 32px rgba(0,0,0,.10);
  --r:16px;--rs:10px;
}
body{background:var(--bg);font-family:'Inter',sans-serif;color:var(--text);min-height:100vh}
.app{max-width:480px;margin:0 auto;min-height:100vh}

/* UTILS */
.btn-p{display:flex;align-items:center;justify-content:center;gap:8px;background:var(--indigo);color:#fff;border:none;cursor:pointer;padding:13px 24px;border-radius:var(--rs);font-family:'Inter',sans-serif;font-size:15px;font-weight:600;transition:all .2s;width:100%}
.btn-p:hover{background:var(--indigo-d);transform:translateY(-1px);box-shadow:0 4px 16px rgba(99,102,241,.35)}
.btn-g{background:none;border:1.5px solid var(--border);cursor:pointer;padding:11px 20px;border-radius:var(--rs);font-family:'Inter',sans-serif;font-size:14px;font-weight:500;color:var(--soft);transition:all .2s;width:100%}
.btn-g:hover{border-color:var(--indigo);color:var(--indigo)}
input[type=email],input[type=password],input[type=text]{width:100%;padding:12px 16px;border-radius:var(--rs);border:1.5px solid var(--border);background:#fff;font-family:'Inter',sans-serif;font-size:15px;color:var(--text);outline:none;transition:border-color .2s}
input:focus{border-color:var(--indigo);box-shadow:0 0 0 3px rgba(99,102,241,.12)}
label{font-size:13px;font-weight:600;color:var(--text);display:block;margin-bottom:6px}
.fg{margin-bottom:16px}
.lnk{background:none;border:none;cursor:pointer;color:var(--indigo);font-size:14px;font-weight:600;font-family:'Inter',sans-serif}

/* HEADER */
.hdr{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:rgba(249,246,240,.94);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
.logo{display:flex;align-items:center;gap:9px;cursor:pointer}
.logo-m{width:32px;height:32px;background:var(--indigo);border-radius:9px;display:flex;align-items:center;justify-content:center}
.logo-t{font-family:'Lora',serif;font-size:18px;font-weight:700;color:var(--text)}
.nav{display:flex;gap:2px}
.np{border:none;background:transparent;cursor:pointer;padding:7px 12px;border-radius:8px;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;color:var(--soft);transition:all .18s}
.np.on{background:var(--indigo-pale);color:var(--indigo);font-weight:600}
.np:hover:not(.on){background:var(--border-s);color:var(--text)}
.av{width:34px;height:34px;border-radius:50%;background:var(--indigo);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700;font-family:'Inter',sans-serif;flex-shrink:0}

/* AUTH */
.auth{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;background:var(--bg)}
.auth-logo{display:flex;align-items:center;gap:10px;margin-bottom:40px}
.auth-lm{width:48px;height:48px;background:var(--indigo);border-radius:14px;display:flex;align-items:center;justify-content:center}
.auth-lt{font-family:'Lora',serif;font-size:26px;font-weight:700;color:var(--text)}
.auth-card{width:100%;max-width:380px;background:#fff;border-radius:var(--r);padding:32px;box-shadow:var(--sh);border:1px solid var(--border)}
.auth-title{font-family:'Lora',serif;font-size:22px;font-weight:700;margin-bottom:6px}
.auth-sub{font-size:14px;color:var(--soft);margin-bottom:28px;line-height:1.5}
.auth-foot{text-align:center;margin-top:20px;font-size:14px;color:var(--soft)}
.auth-err{background:#FEF2F2;color:#DC2626;border-radius:6px;padding:10px 14px;font-size:13px;margin-bottom:16px;border:1px solid #FECACA}

/* RACHA */
.racha{display:flex;align-items:center;gap:14px;background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:14px 18px;margin:16px 20px 0;box-shadow:var(--sh)}
.racha-ic{font-size:28px;line-height:1}
.racha-inf{flex:1}
.racha-top{display:flex;align-items:baseline;gap:5px;margin-bottom:6px}
.racha-n{font-size:22px;font-weight:700;color:var(--text)}
.racha-lb{font-size:13px;color:var(--soft);font-weight:500}
.rb-bg{height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:4px}
.rb-fill{height:100%;background:linear-gradient(90deg,var(--indigo-l),var(--indigo));border-radius:3px;transition:width .5s}
.racha-mt{font-size:11px;color:var(--mute)}

/* HERO */
.imain{padding-bottom:48px}
.hero{padding:28px 20px 20px}
.hero-t{font-family:'Lora',serif;font-size:30px;line-height:1.25;font-weight:700;margin-bottom:12px}
.hero-s{font-size:14px;color:var(--soft);line-height:1.7}

/* SECCIÓN */
.sec{padding:24px 20px 0}
.sec-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.sec-t{font-size:13px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:.6px}
.ver-t{background:none;border:none;cursor:pointer;font-size:13px;color:var(--indigo);font-weight:600;font-family:'Inter',sans-serif}

/* IDIOMAS */
.id-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.id-card{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 8px;border-radius:var(--rs);background:#fff;border:2px solid var(--border);cursor:pointer;transition:all .18s;box-shadow:var(--sh)}
.id-card:hover{border-color:var(--indigo-l)}
.id-card.on{border-color:var(--indigo);background:var(--indigo-pale)}
.id-flag{width:36px;height:36px;border-radius:50%;overflow:hidden}
.id-name{font-size:12px;font-weight:600;color:var(--soft)}
.id-card.on .id-name{color:var(--indigo)}

/* SLIDER */
.imm-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.imm-val{font-size:22px;font-weight:700;color:var(--indigo);font-family:'Lora',serif}
.slider{width:100%;-webkit-appearance:none;appearance:none;height:5px;border-radius:3px;outline:none;cursor:pointer}
.slider::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--indigo);box-shadow:0 2px 8px rgba(99,102,241,.4);cursor:pointer;border:3px solid #fff}
.imm-lbs{display:flex;justify-content:space-between;font-size:11px;color:var(--mute);margin-top:8px}
.plock{color:var(--indigo);font-weight:600}

/* LIBROS */
.lb-scroll{display:flex;gap:14px;padding:4px 20px 24px;overflow-x:auto;scrollbar-width:none}
.lb-scroll::-webkit-scrollbar{display:none}
.lb-card{flex:0 0 148px;border-radius:var(--r);background:#fff;box-shadow:var(--sh);overflow:hidden;cursor:pointer;transition:all .2s;border:1px solid var(--border)}
.lb-card:hover{transform:translateY(-3px);box-shadow:var(--sh2)}
.lb-cov{height:100px;display:flex;align-items:center;justify-content:center;font-size:40px;position:relative}
.lb-cov.grimm{background:linear-gradient(135deg,#e0e7ff,#c7d2fe)}
.lb-cov.andersen{background:linear-gradient(135deg,#dbeafe,#bfdbfe)}
.lb-cov.lock{background:linear-gradient(135deg,#f1f5f9,#e2e8f0)}
.lb-prem{position:absolute;top:8px;right:8px;background:var(--indigo);color:#fff;font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;letter-spacing:.5px}
.lb-inf{padding:10px 12px 12px}
.lb-cat{font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--indigo);font-weight:700;display:block;margin-bottom:3px}
.lb-tit{font-size:13px;font-weight:700;color:var(--text);line-height:1.3;font-family:'Lora',serif;display:block;margin-bottom:2px}
.lb-aut{font-size:11px;color:var(--mute);display:block}

/* BIBLIOTECA */
.pmain{padding:20px 20px 48px}
.ptit{font-family:'Lora',serif;font-size:26px;font-weight:700;margin-bottom:20px}
.lb-list{display:flex;flex-direction:column;gap:12px}
.lb-row{display:flex;align-items:center;gap:14px;background:#fff;border-radius:var(--r);padding:14px 16px;cursor:pointer;box-shadow:var(--sh);border:1px solid var(--border);transition:all .15s}
.lb-row:hover{transform:translateX(3px);box-shadow:var(--sh2)}
.lb-row.blk{opacity:.55}
.lb-rc{width:52px;height:60px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:28px;position:relative}
.lo{position:absolute;inset:0;background:rgba(15,23,42,.35);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px}
.lb-ri{flex:1;min-width:0}
.badge-pr{background:var(--indigo);color:#fff;font-size:9px;font-weight:700;padding:4px 8px;border-radius:6px;letter-spacing:.5px;white-space:nowrap}

/* AJUSTES */
.aj-bl{background:#fff;border-radius:var(--r);padding:20px;margin-bottom:16px;box-shadow:var(--sh);border:1px solid var(--border)}
.aj-t{font-size:15px;font-weight:700;margin-bottom:4px}
.aj-d{font-size:13px;color:var(--soft);margin-bottom:16px;line-height:1.5}
.metas{display:flex;flex-direction:column;gap:10px}
.mc{border:1.5px solid var(--border);border-radius:var(--rs);padding:13px 15px;cursor:pointer;transition:all .18s;background:var(--bg)}
.mc.on{border-color:var(--indigo);background:var(--indigo-pale)}
.ml{font-size:14px;font-weight:500}
.mvs{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.mv{flex:1;min-width:40px;padding:7px 4px;border-radius:8px;border:1.5px solid var(--border);background:#fff;cursor:pointer;font-size:14px;font-weight:600;font-family:'Inter',sans-serif;transition:all .15s}
.mv.on{border-color:var(--indigo);background:var(--indigo);color:#fff}
.prem-bl{background:linear-gradient(135deg,#1E293B,#0F172A);border-radius:var(--r);padding:24px}
.prem-bl .aj-t{color:#E0E7FF;font-size:17px;margin-bottom:16px}
.prem-li{list-style:none;display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.prem-li li{font-size:14px;color:rgba(255,255,255,.8)}
.btn-prem{width:100%;padding:14px;border-radius:var(--rs);background:var(--indigo);border:none;cursor:pointer;color:#fff;font-size:15px;font-weight:700;font-family:'Inter',sans-serif;box-shadow:0 4px 16px rgba(99,102,241,.5);transition:all .2s}
.btn-prem:hover{background:var(--indigo-d);transform:translateY(-1px)}

/* LECTOR */
.lec-wrap{display:flex;flex-direction:column;min-height:100vh;background:#F9F6F0}
.lec-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.btn-v{background:none;border:none;cursor:pointer;font-size:14px;font-weight:600;color:var(--indigo);font-family:'Inter',sans-serif;padding:4px 0}
.lec-th{font-size:15px;font-weight:600;color:var(--text);font-family:'Lora',serif;max-width:160px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lec-badge{display:flex;align-items:center;gap:5px;background:var(--indigo-pale);border-radius:20px;padding:5px 10px;font-size:13px;font-weight:700;color:var(--indigo)}
.prog-wrap{height:3px;background:var(--border);position:sticky;top:57px;z-index:99}
.prog-fill{height:100%;background:var(--indigo);transition:width .3s}
.lec-ctrl{display:flex;align-items:center;gap:12px;padding:10px 16px;background:#fff;border-bottom:1px solid var(--border-s)}
.ctrl-lb{font-size:11px;color:var(--mute);display:block;margin-bottom:5px;font-weight:500;letter-spacing:.3px}
.ctrl-lb strong{color:var(--indigo)}
.ctrl-im{flex:1}
.sl-mini{width:100%;-webkit-appearance:none;appearance:none;height:4px;border-radius:2px;outline:none;cursor:pointer}
.sl-mini::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:var(--indigo);cursor:pointer;border:2.5px solid #fff;box-shadow:0 1px 5px rgba(99,102,241,.35)}
.id-minis{display:flex;gap:5px}
.id-mb{width:32px;height:32px;background:var(--border-s);border:1.5px solid transparent;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;padding:4px}
.id-mb.on{border-color:var(--indigo);background:var(--indigo-pale)}
.lec-main{padding:28px 22px 60px;flex:1}
.cap-t{font-family:'Lora',serif;font-size:21px;font-weight:700;margin-bottom:6px}
.cap-lb{font-size:13px;color:var(--mute);margin-bottom:24px}
.sep{height:2px;background:linear-gradient(90deg,var(--indigo),transparent);border-radius:1px;margin-bottom:28px;width:60px}
.txt{font-family:'Lora',serif;font-size:18px;line-height:2;color:var(--text)}
.par{margin-bottom:1.4em}
.pal-k{color:var(--indigo);font-weight:600}
.pal-n{position:relative;color:var(--indigo);font-weight:600;cursor:pointer;border-bottom:1.5px dashed var(--indigo-l)}
.tt{display:none;position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:var(--text);color:#fff;border-radius:9px;padding:7px 12px;font-size:12px;white-space:nowrap;z-index:300;box-shadow:0 4px 16px rgba(0,0,0,.2);font-family:'Inter',sans-serif;font-weight:500;pointer-events:none;align-items:center;gap:6px}
.tt::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:var(--text)}
.pal-n:hover .tt{display:flex}
.to{color:rgba(255,255,255,.5);text-decoration:line-through;font-size:11px}
.ta{color:var(--indigo-l);font-size:11px}
.tn{color:#fff}
.leyenda{margin-top:36px;padding:14px 16px;background:var(--indigo-pale);border-radius:var(--rs);font-size:13px;color:var(--soft);line-height:1.6}
.pm-wrap{position:absolute;top:60px;right:16px;z-index:200;background:#fff;border-radius:var(--rs);border:1px solid var(--border);box-shadow:var(--sh2);min-width:200px;overflow:hidden}
.pm-hdr{padding:14px 16px;border-bottom:1px solid var(--border-s)}
.pm-name{font-size:14px;font-weight:700}
.pm-email{font-size:12px;color:var(--mute)}
.pm-item{display:flex;align-items:center;gap:10px;padding:12px 16px;font-size:14px;color:var(--text);cursor:pointer;border:none;background:none;width:100%;text-align:left;font-family:'Inter',sans-serif;font-weight:500;transition:background .15s}
.pm-item:hover{background:var(--border-s)}
.pm-item.danger{color:#DC2626}
</style>
</head>

// ── MEZCLA ─────────────────────────────────────────────────────────────────────
function mezclar(txt,idioma,pct,aprendidas){
  const tokens=[];
  let i=0;
  while(i<txt.length){
    let matched=false;
    for(const e of EXPR){
      if(txt.substring(i).toLowerCase().startsWith(e.es)){
        const trad=e[idioma];
        if(trad){tokens.push({tipo:'e',orig:txt.substring(i,i+e.es.length),trad,key:e.es});i+=e.es.length;matched=true;break;}
      }
    }
    if(matched)continue;
    const wm=txt.substring(i).match(/^[a-záéíóúüñA-ZÁÉÍÓÚÜÑ]+/);
    if(wm){tokens.push({tipo:'w',txt:wm[0]});i+=wm[0].length;}
    else{tokens.push({tipo:'l',txt:txt[i]});i++;}
  }
  const cands=tokens.filter(t=>(t.tipo==='e')||(t.tipo==='w'&&EXPR.some(e=>e.es===t.txt.toLowerCase())));
  const n=Math.floor(cands.length*(pct/100));
  const chosen=new Set(cands.sort(()=>Math.random()-.5).slice(0,n).map(t=>t.tipo==='e'?t.key:t.txt.toLowerCase()));
  return tokens.map(t=>{
    if(t.tipo==='l')return{r:'l',txt:t.txt};
    if(t.tipo==='e'){
      const ya=aprendidas.has(t.key);
      const sel=chosen.has(t.key);
      return{r:ya?'k':(sel?'n':'p'),orig:t.orig,trad:t.trad,key:t.key};
    }
    const e=EXPR.find(ex=>ex.es===t.txt.toLowerCase());
    if(e&&e[idioma]){
      const ya=aprendidas.has(e.es);const sel=chosen.has(e.es);
      return{r:ya?'k':(sel?'n':'p'),orig:t.txt,trad:e[idioma],key:e.es};
    }
    return{r:'p',txt:t.txt};
  });
}

// AUTH HOOK
function useAuth(){
  const [user,setUser]=useState(()=>{try{return JSON.parse(localStorage.getItem('tx_u')||'null');}catch{return null;}});
  function reg(name,email,pw){
    const us=JSON.parse(localStorage.getItem('tx_us')||'{}');
    if(us[email])return{error:'Este email ya está registrado.'};
    const u={name,email,racha:0,idioma:'en'};
    us[email]={...u,pw};
    localStorage.setItem('tx_us',JSON.stringify(us));
    localStorage.setItem('tx_u',JSON.stringify(u));
    setUser(u);return{ok:true};
  }
  function login(email,pw){
    const us=JSON.parse(localStorage.getItem('tx_us')||'{}');
    const u=us[email];
    if(!u||u.pw!==pw)return{error:'Email o contraseña incorrectos.'};
    const nu={name:u.name,email,racha:u.racha||0,idioma:u.idioma||'en'};
    localStorage.setItem('tx_u',JSON.stringify(nu));setUser(nu);return{ok:true};
  }
  function logout(){localStorage.removeItem('tx_u');setUser(null);}
  function upd(c){const nu={...user,...c};localStorage.setItem('tx_u',JSON.stringify(nu));setUser(nu);}
  return{user,reg,login,logout,upd};
}

           {tipo:'palabras',unidad:'pal',label:'💬 Palabras nuevas',vals:[5,10,20,30,50]},
           {tipo:'paginas',unidad:'pág',label:'📄 Páginas leídas',vals:[1,2,3,5,10]},
          ].map(o=>React.createElement('div',{key:o.tipo,className:`mc ${meta.tipo===o.tipo?'on':''}`,onClick:()=>setMeta({tipo:o.tipo,unidad:o.unidad,valor:o.vals[1]})},
            React.createElement('span',{className:'ml'},o.label),
            meta.tipo===o.tipo&&React.createElement('div',{className:'mvs'},
              o.vals.map(v=>React.createElement('button',{key:v,className:`mv ${meta.valor===v?'on':''}`,onClick:e=>{e.stopPropagation();setMeta(m=>({...m,valor:v}));}},v))))))),
      React.createElement('div',{className:'prem-bl'},
        React.createElement('div',{className:'aj-t'},'✨ Talixea Premium'),
        React.createElement('ul',{className:'prem-li'},
          ['📚 Biblioteca completa — Grimm, Andersen y más','🎯 Inmersión hasta el 100%','📊 Estadísticas detalladas','📵 Modo sin conexión','🚫 Sin anuncios']
          .map((t,i)=>React.createElement('li',{key:i},t))),
        React.createElement('button',{className:'btn-prem'},'Probar gratis 7 días — 4,99€/mes'))
    )

  // ── LECTOR ────────────────────────────────────────────────────────────────────
  const capObj=libro?.caps[cap];
  return React.createElement('div',{className:'lec-wrap',ref:lRef,style:{overflowY:'auto',height:'100vh'}},
    React.createElement('header',{className:'lec-hdr'},
      React.createElement('button',{className:'btn-v',onClick:()=>setPg('biblioteca')},'← Volver'),
      React.createElement('span',{className:'lec-th'},libro?.tit),
      React.createElement('div',{className:'lec-badge'},
        React.createElement('div',{style:{width:18,height:18}},React.createElement(Flag,{id:idioma,size:18})),
        React.createElement('span',null,`${imm}%`))),
    React.createElement('div',{className:'prog-wrap'},React.createElement('div',{className:'prog-fill',style:{width:`${prog}%`}})),
    React.createElement('div',{className:'lec-ctrl'},
      React.createElement('div',{className:'ctrl-im'},
        React.createElement('span',{className:'ctrl-lb'},React.createElement('span',null,'Inmersión: '),React.createElement('strong',null,`${imm}%`)),
        React.createElement(SliderImm,{val:imm,onChange:setImm,mini:true})),
      React.createElement('div',{className:'id-minis'},
        IDIOMAS.map(id=>React.createElement('button',{key:id.id,className:`id-mb ${idioma===id.id?'on':''}`,title:id.n,onClick:()=>upd({idioma:id.id})},
          React.createElement(Flag,{id:id.id,size:20}))))),
    React.createElement('main',{className:'lec-main'},
      React.createElement('h2',{className:'cap-t'},capObj?.tit),
      React.createElement('p',{className:'cap-lb'},`${libro?.aut} · ${libro?.cat}`),
      React.createElement('div',{className:'sep'}),
      React.createElement('div',{className:'txt'},renderTxt(toks,key=>setAprd(p=>new Set([...p,key])))),
      libro?.caps?.length>1&&React.createElement('div',{style:{display:'flex',gap:10,marginTop:36}},
        cap>0&&React.createElement('button',{className:'btn-g',onClick:()=>setCap(v=>v-1)},'← Capítulo anterior'),
        cap<libro.caps.length-1&&React.createElement('button',{className:'btn-p',onClick:()=>setCap(v=>v+1)},'Capítulo siguiente →')),
      React.createElement('div',{className:'leyenda'},
        React.createElement('strong',{style:{color:'var(--indigo)'}},'Palabras en índigo'),
        ' = ya las conoces · subrayadas punteadas = toca para ver el original · haz clic para marcarlas como aprendidas')
    )
  );
}
